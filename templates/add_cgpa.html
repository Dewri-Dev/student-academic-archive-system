{% extends "base.html" %}
{% block title %}Add Semester Grades | Academic Archive{% endblock %}

{% block content %}
<script src="https://unpkg.com/@phosphor-icons/web"></script>

<div class="min-h-screen bg-slate-50 flex flex-col justify-center py-12 px-4 sm:px-6 lg:px-8 font-sans selection:bg-violet-100 selection:text-violet-900">
    
    <div class="absolute top-0 left-0 w-full p-6 lg:p-10 flex justify-between items-center z-10">
        <div class="flex items-center gap-3">
            <div class="bg-violet-600 p-2 rounded-xl shadow-lg shadow-violet-200">
                <i class="ph ph-hexagon-fill text-white text-xl"></i>
            </div>
            <span class="text-xl font-bold tracking-tight text-slate-800">Archive<span class="text-violet-600">HQ</span></span>
        </div>
        <a href="/cgpa" class="flex items-center gap-2 px-5 py-2.5 text-sm font-bold text-slate-600 bg-white border border-slate-200 rounded-xl hover:bg-slate-50 hover:text-slate-900 transition-colors shadow-sm">
            <i class="ph ph-x text-lg"></i> Close
        </a>
    </div>

    <div class="max-w-5xl w-full mx-auto bg-white rounded-[2rem] shadow-xl shadow-slate-200/50 overflow-hidden border border-slate-100 relative z-20 mt-12">
        <div class="flex flex-col md:flex-row h-full">
            
            <div class="md:w-5/12 p-10 bg-violet-50 flex flex-col justify-center relative overflow-hidden">
                <div class="absolute -top-20 -left-20 w-64 h-64 bg-violet-200/40 rounded-full blur-3xl"></div>
                
                <div class="relative z-10 text-center">
                    <div class="w-20 h-20 bg-violet-100 text-violet-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-inner border border-violet-200/50">
                        <i class="ph-duotone ph-exam text-5xl"></i>
                    </div>
                    <h2 class="text-3xl font-black text-slate-800 tracking-tight mb-3">Log Your Grades</h2>
                    <p class="text-slate-500 font-medium leading-relaxed">
                        Add your semester details to keep your overall CGPA accurate and up-to-date on your dashboard.
                    </p>
                </div>
            </div>

            <div class="md:w-7/12 p-10 md:p-12 flex flex-col justify-center bg-white">
                <div class="mb-8">
                    <h3 class="text-2xl font-bold text-slate-800">Semester Details</h3>
                </div>
                
                <form class="space-y-6" action="/cgpa/add" method="POST">
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div>
                            <label for="semester_number" class="block text-sm font-bold text-slate-700 mb-1.5">Semester</label>
                            <div class="relative group">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <i class="ph ph-hash text-slate-400 text-lg group-focus-within:text-violet-500 transition-colors"></i>
                                </div>
                                <input id="semester_number" name="semester_number" type="number" min="1" max="10" required 
                                       placeholder="e.g., 4"
                                       class="block w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-700 placeholder-slate-400 font-medium focus:bg-white focus:outline-none focus:ring-4 focus:ring-violet-50 focus:border-violet-300 transition-all shadow-sm">
                            </div>
                        </div>

                        <div>
                            <label for="credits" class="block text-sm font-bold text-slate-700 mb-1.5">Total Credits</label>
                            <div class="relative group">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <i class="ph ph-books text-slate-400 text-lg group-focus-within:text-violet-500 transition-colors"></i>
                                </div>
                                <input id="credits" name="credits" type="number" min="1" max="50" required 
                                       placeholder="e.g., 24"
                                       class="block w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-700 placeholder-slate-400 font-medium focus:bg-white focus:outline-none focus:ring-4 focus:ring-violet-50 focus:border-violet-300 transition-all shadow-sm">
                            </div>
                        </div>
                    </div>

                    <div>
                        <label for="sgpa" class="block text-sm font-bold text-slate-700 mb-1.5">SGPA (Semester GPA)</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="ph ph-chart-line-up text-slate-400 text-lg group-focus-within:text-violet-500 transition-colors"></i>
                            </div>
                            <input id="sgpa" name="sgpa" type="number" step="0.01" min="0" max="10" required 
                                   placeholder="e.g., 8.75"
                                   class="block w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-700 placeholder-slate-400 font-medium focus:bg-white focus:outline-none focus:ring-4 focus:ring-violet-50 focus:border-violet-300 transition-all shadow-sm">
                        </div>
                    </div>

                    <div class="flex flex-col-reverse sm:flex-row items-center gap-4 pt-8 border-t border-slate-100">
                        <a href="/cgpa" class="w-full sm:w-auto flex-1 flex justify-center py-3.5 px-6 border border-slate-200 rounded-xl shadow-sm text-sm font-bold text-slate-600 bg-white hover:bg-slate-50 transition-colors">
                            Cancel
                        </a>
                        <button type="submit" 
                                class="w-full flex-1 flex justify-center items-center gap-2 py-3.5 px-6 border border-transparent rounded-xl shadow-md shadow-violet-200 text-sm font-bold text-white bg-violet-600 hover:bg-violet-700 focus:outline-none focus:ring-4 focus:ring-violet-50 focus:border-violet-300 transition-all">
                            <i class="ph ph-check-circle text-lg"></i>
                            Save Semester
                        </button>
                    </div>
                    
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
