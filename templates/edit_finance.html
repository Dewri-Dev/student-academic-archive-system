{% extends "base.html" %}
{% block title %}Update Fees | Academic Archive{% endblock %}

{% block content %}
<script src="https://unpkg.com/@phosphor-icons/web"></script>

<div class="min-h-screen bg-slate-50 flex flex-col justify-center py-12 px-4 sm:px-6 lg:px-8 font-sans selection:bg-emerald-100 selection:text-emerald-900">
    
    <div class="absolute top-0 left-0 w-full p-6 lg:p-10 flex justify-between items-center z-10">
        <div class="flex items-center gap-3">
            <div class="bg-violet-600 p-2 rounded-xl shadow-lg shadow-violet-200">
                <i class="ph ph-hexagon-fill text-white text-xl"></i>
            </div>
            <span class="text-xl font-bold tracking-tight text-slate-800">Archive<span class="text-violet-600">HQ</span></span>
        </div>
        <a href="/finance/manage" class="flex items-center gap-2 px-5 py-2.5 text-sm font-bold text-slate-600 bg-white border border-slate-200 rounded-xl hover:bg-slate-50 hover:text-slate-900 transition-colors shadow-sm">
            <i class="ph ph-x text-lg"></i> Cancel
        </a>
    </div>

    <div class="max-w-5xl w-full mx-auto bg-white rounded-[2rem] shadow-xl shadow-slate-200/50 overflow-hidden border border-slate-100 relative z-20 mt-12">
        <div class="flex flex-col md:flex-row h-full">
            
            <div class="md:w-5/12 p-10 bg-emerald-50 flex flex-col justify-center relative overflow-hidden">
                <div class="absolute -top-20 -left-20 w-64 h-64 bg-emerald-200/40 rounded-full blur-3xl"></div>
                <div class="absolute -bottom-20 -right-20 w-64 h-64 bg-emerald-200/40 rounded-full blur-3xl"></div>
                
                <div class="relative z-10 text-center">
                    <div class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-inner border border-emerald-200/50">
                        <i class="ph-duotone ph-currency-inr text-5xl"></i>
                    </div>
                    <h2 class="text-3xl font-black text-slate-800 tracking-tight mb-3">Update Semester {{ fee[0] }}</h2>
                    <p class="text-slate-500 font-medium leading-relaxed">
                        Modify the fee breakdown for this semester. The total fee will be calculated automatically upon saving.
                    </p>
                </div>
            </div>

            <div class="md:w-7/12 p-10 md:p-12 flex flex-col justify-center bg-white">
                <div class="mb-8">
                    <h3 class="text-2xl font-bold text-slate-800">Fee Breakdown (Rs.)</h3>
                </div>
                
                <form class="space-y-6" action="/finance/edit/{{ fee[0] }}" method="POST">
                    
                    <div>
                        <label for="admission_fee" class="block text-sm font-bold text-slate-700 mb-1.5">Admission Fee (Non-refundable)</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="ph ph-file-text text-slate-400 text-lg group-focus-within:text-emerald-500 transition-colors"></i>
                            </div>
                            <input id="admission_fee" name="admission_fee" type="number" required value="{{ fee[1] }}"
                                   class="block w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-700 font-medium focus:bg-white focus:outline-none focus:ring-4 focus:ring-emerald-50 focus:border-emerald-300 transition-all shadow-sm">
                        </div>
                    </div>

                    <div>
                        <label for="campus_fee" class="block text-sm font-bold text-slate-700 mb-1.5">Campus Development Fee</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="ph ph-buildings text-slate-400 text-lg group-focus-within:text-emerald-500 transition-colors"></i>
                            </div>
                            <input id="campus_fee" name="campus_fee" type="number" required value="{{ fee[2] }}"
                                   class="block w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-700 font-medium focus:bg-white focus:outline-none focus:ring-4 focus:ring-emerald-50 focus:border-emerald-300 transition-all shadow-sm">
                        </div>
                    </div>

                    <div>
                        <label for="course_fee" class="block text-sm font-bold text-slate-700 mb-1.5">Course Fee</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="ph ph-books text-slate-400 text-lg group-focus-within:text-emerald-500 transition-colors"></i>
                            </div>
                            <input id="course_fee" name="course_fee" type="number" required value="{{ fee[3] }}"
                                   class="block w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-700 font-medium focus:bg-white focus:outline-none focus:ring-4 focus:ring-emerald-50 focus:border-emerald-300 transition-all shadow-sm">
                        </div>
                    </div>

                    <div class="flex flex-col-reverse sm:flex-row items-center gap-4 pt-8 border-t border-slate-100">
                        <button type="submit" 
                                class="w-full flex-1 flex justify-center items-center gap-2 py-3.5 px-6 border border-transparent rounded-xl shadow-md shadow-emerald-200 text-sm font-bold text-white bg-emerald-600 hover:bg-emerald-700 focus:outline-none focus:ring-4 focus:ring-emerald-50 focus:border-emerald-300 transition-all">
                            <i class="ph ph-floppy-disk text-lg"></i>
                            Save Changes
                        </button>
                    </div>
                    
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
