{% extends "base.html" %}
{% block title %}Log Credits | Academic Archive{% endblock %}

{% block content %}
<script src="https://unpkg.com/@phosphor-icons/web"></script>

<div class="min-h-screen bg-slate-50 flex flex-col justify-center py-12 px-4 sm:px-6 lg:px-8 font-sans selection:bg-blue-100 selection:text-blue-900">
    
    <div class="absolute top-0 left-0 w-full p-6 lg:p-10 flex justify-between items-center z-10">
        <div class="flex items-center gap-3">
            <div class="bg-violet-600 p-2 rounded-xl shadow-lg shadow-violet-200">
                <i class="ph ph-hexagon-fill text-white text-xl"></i>
            </div>
            <span class="text-xl font-bold tracking-tight text-slate-800">Archive<span class="text-violet-600">HQ</span></span>
        </div>
        <a href="/credits" class="flex items-center gap-2 px-5 py-2.5 text-sm font-bold text-slate-600 bg-white border border-slate-200 rounded-xl hover:bg-slate-50 hover:text-slate-900 transition-colors shadow-sm">
            <i class="ph ph-x text-lg"></i> Close
        </a>
    </div>

    <div class="max-w-5xl w-full mx-auto bg-white rounded-[2rem] shadow-xl shadow-slate-200/50 overflow-hidden border border-slate-100 relative z-20 mt-12">
        <div class="flex flex-col md:flex-row h-full">
            
            <div class="md:w-5/12 p-10 bg-blue-50 flex flex-col justify-center relative overflow-hidden">
                <div class="absolute -top-20 -left-20 w-64 h-64 bg-blue-200/40 rounded-full blur-3xl"></div>
                <div class="absolute -bottom-20 -right-20 w-64 h-64 bg-blue-200/40 rounded-full blur-3xl"></div>
                
                <div class="relative z-10 text-center">
                    <div class="w-20 h-20 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-inner border border-blue-200/50">
                        <i class="ph-duotone ph-graduation-cap text-5xl"></i>
                    </div>
                    <h2 class="text-3xl font-black text-slate-800 tracking-tight mb-3">Log Coursework</h2>
                    <p class="text-slate-500 font-medium leading-relaxed">
                        Add individual courses you've completed to accurately build your transcript and track your progress toward graduation.
                    </p>
                </div>
            </div>

            <div class="md:w-7/12 p-10 md:p-12 flex flex-col justify-center bg-white">
                <div class="mb-8">
                    <h3 class="text-2xl font-bold text-slate-800">Course Details</h3>
                </div>
                
                <form class="space-y-6" action="/credits/add" method="POST">
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div>
                            <label for="course_code" class="block text-sm font-bold text-slate-700 mb-1.5">Course Code</label>
                            <div class="relative group">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <i class="ph ph-barcode text-slate-400 text-lg group-focus-within:text-blue-500 transition-colors"></i>
                                </div>
                                <input id="course_code" name="course_code" type="text" required 
                                       placeholder="e.g., CS-101"
                                       class="block w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-700 placeholder-slate-400 font-medium focus:bg-white focus:outline-none focus:ring-4 focus:ring-blue-50 focus:border-blue-300 transition-all shadow-sm">
                            </div>
                        </div>

                        <div>
                            <label for="credits" class="block text-sm font-bold text-slate-700 mb-1.5">Credits Worth</label>
                            <div class="relative group">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <i class="ph ph-star text-slate-400 text-lg group-focus-within:text-blue-500 transition-colors"></i>
                                </div>
                                <input id="credits" name="credits" type="number" min="1" max="10" required 
                                       placeholder="e.g., 3"
                                       class="block w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-700 placeholder-slate-400 font-medium focus:bg-white focus:outline-none focus:ring-4 focus:ring-blue-50 focus:border-blue-300 transition-all shadow-sm">
                            </div>
                        </div>
                    </div>

                    <div>
                        <label for="course_name" class="block text-sm font-bold text-slate-700 mb-1.5">Course Name</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="ph ph-text-t text-slate-400 text-lg group-focus-within:text-blue-500 transition-colors"></i>
                            </div>
                            <input id="course_name" name="course_name" type="text" required 
                                   placeholder="e.g., Intro to Computer Science"
                                   class="block w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-700 placeholder-slate-400 font-medium focus:bg-white focus:outline-none focus:ring-4 focus:ring-blue-50 focus:border-blue-300 transition-all shadow-sm">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div>
                            <label for="grade" class="block text-sm font-bold text-slate-700 mb-1.5">Grade Achieved</label>
                            <div class="relative group">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <i class="ph ph-exam text-slate-400 text-lg group-focus-within:text-blue-500 transition-colors"></i>
                                </div>
                                <select id="grade" name="grade" required 
                                       class="block w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-700 font-medium focus:bg-white focus:outline-none focus:ring-4 focus:ring-blue-50 focus:border-blue-300 transition-all shadow-sm appearance-none cursor-pointer">
                                    <option value="" disabled selected>Select Grade</option>
                                    <option value="A+">A+</option>
                                    <option value="A">A</option>
                                    <option value="B+">B+</option>
                                    <option value="B">B</option>
                                    <option value="C">C</option>
                                    <option value="P">Pass (P)</option>
                                </select>
                                <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                                    <i class="ph ph-caret-down text-slate-400"></i>
                                </div>
                            </div>
                        </div>

                        <div>
                            <label for="semester" class="block text-sm font-bold text-slate-700 mb-1.5">Semester Taken</label>
                            <div class="relative group">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <i class="ph ph-calendar-blank text-slate-400 text-lg group-focus-within:text-blue-500 transition-colors"></i>
                                </div>
                                <input id="semester" name="semester" type="number" min="1" max="10" required 
                                       placeholder="e.g., 2"
                                       class="block w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-700 placeholder-slate-400 font-medium focus:bg-white focus:outline-none focus:ring-4 focus:ring-blue-50 focus:border-blue-300 transition-all shadow-sm">
                            </div>
                        </div>
                    </div>

                    <div class="flex flex-col-reverse sm:flex-row items-center gap-4 pt-8 border-t border-slate-100">
                        <a href="/credits" class="w-full sm:w-auto flex-1 flex justify-center py-3.5 px-6 border border-slate-200 rounded-xl shadow-sm text-sm font-bold text-slate-600 bg-white hover:bg-slate-50 transition-colors">
                            Cancel
                        </a>
                        <button type="submit" 
                                class="w-full flex-1 flex justify-center items-center gap-2 py-3.5 px-6 border border-transparent rounded-xl shadow-md shadow-blue-200 text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-4 focus:ring-blue-50 focus:border-blue-300 transition-all">
                            <i class="ph ph-plus text-lg"></i>
                            Log Course
                        </button>
                    </div>
                    
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
